name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build iOS
        run: flutter build ios --release --no-codesign -v 2>&1 | tail -200

      - name: Create IPA
        run: |
          APP_PATH=$(find build/ios -name "*.app" -type d | head -1)
          echo "APP encontrado: $APP_PATH"
          ls -la "$APP_PATH"
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa && zip -r "$GITHUB_WORKSPACE/risk_runner.ipa" Payload/
          ls -lh "$GITHUB_WORKSPACE/risk_runner.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_ipa
          path: ${{ github.workspace }}/risk_runner.ipa

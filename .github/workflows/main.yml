name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate plugin registrant
        run: flutter build ios --release --no-codesign --no-pub 2>&1 || true

      - name: Write Podfile script
        run: |
          printf '%s\n' "content = '''load File.join(File.dirname(File.realpath(__FILE__)), \"Flutter\", \"podhelper.rb\")" > /tmp/write_podfile.py
          printf '%s\n' "platform :ios, \"15.0\"" >> /tmp/write_podfile.py
          printf '%s\n' "target \"Runner\" do" >> /tmp/write_podfile.py
          printf '%s\n' "  use_frameworks! :linkage => :static" >> /tmp/write_podfile.py
          printf '%s\n' "  use_modular_headers!" >> /tmp/write_podfile.py
          printf '%s\n' "  flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))" >> /tmp/write_podfile.py
          printf '%s\n' "end" >> /tmp/write_podfile.py
          printf '%s\n' "post_install do |installer|" >> /tmp/write_podfile.py
          printf '%s\n' "  installer.pods_project.targets.each do |target|" >> /tmp/write_podfile.py
          printf '%s\n' "    flutter_additional_ios_build_settings(target)" >> /tmp/write_podfile.py
          printf '%s\n' "    target.build_configurations.each do |config|" >> /tmp/write_podfile.py
          printf '%s\n' "      config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"15.0\"" >> /tmp/write_podfile.py
          printf '%s\n' "      config.build_settings[\"DEFINES_MODULE\"] = \"YES\"" >> /tmp/write_podfile.py
          printf '%s\n' "      config.build_settings[\"SWIFT_VERSION\"] = \"5.0\"" >> /tmp/write_podfile.py
          printf '%s\n' "    end" >> /tmp/write_podfile.py
          printf '%s\n' "  end" >> /tmp/write_podfile.py
          printf '%s\n' "end" >> /tmp/write_podfile.py
          printf '%s\n' "'''" >> /tmp/write_podfile.py
          printf '%s\n' "open('ios/Podfile', 'w').write(content)" >> /tmp/write_podfile.py
          printf '%s\n' "print('Podfile escrito OK')" >> /tmp/write_podfile.py

      - name: Overwrite Podfile
        run: python3 /tmp/write_podfile.py

      - name: Show Podfile
        run: cat ios/Podfile

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive 2>&1 | tail -150

      - name: Create IPA
        run: |
          APP_PATH="build/ios/Release-iphoneos/Runner.app"
          echo "=== Contenido del .app ==="
          ls -la "$APP_PATH"
          echo "=== Buscando ejecutable ==="
          file "$APP_PATH/Runner" || echo "No existe Runner ejecutable"
          mkdir -p build/ipa/Payload
          cp -r "$APP_PATH" build/ipa/Payload/
          cd build/ipa && zip -r "$GITHUB_WORKSPACE/risk_runner.ipa" Payload/
          echo "=== IPA creado ==="
          ls -lh "$GITHUB_WORKSPACE/risk_runner.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_ipa
          path: ${{ github.workspace }}/risk_runner.ipa

      

name: Build iOS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 3. Flutter dependencies ────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 4. Limpiar Pods residuales ─────────────────────────────────────────
      #   Si existe carpeta Pods (de caché o del repo), Flutter la reutiliza
      #   sin instalar los módulos nuevos → "Module not found".
      #   La borramos para forzar instalación limpia.
      - name: Clean Pods directory
        run: |
          cd ios
          rm -rf Pods
          rm -rf .symlinks
          rm -f Podfile.lock

      # ── 5. CocoaPods install ───────────────────────────────────────────────
      #   Instalamos ANTES de que Flutter lo intente.
      #   --repo-update garantiza que descarga cloud_firestore y Firebase frescos.
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      # ── 6. Flutter build iOS ───────────────────────────────────────────────
      #   FLUTTER_COCOAPODS_SKIP_PODS_INSTALL evita que Flutter vuelva a
      #   ejecutar pod install y machaque la instalación que acabamos de hacer.
      - name: Build iOS (release, no codesign)
        run: flutter build ios --release --no-codesign
        env:
          FLUTTER_COCOAPODS_SKIP_PODS_INSTALL: "true"

      # ── 7. Subir artefacto ─────────────────────────────────────────────────
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

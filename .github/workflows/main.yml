name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate plugin registrant
        run: flutter build ios --release --no-codesign --no-pub 2>&1 || true

      - name: Overwrite Podfile
        run: |
          python3 -c "
          content = open('ios/Podfile').read()
          print('Podfile original:', content[:100])
          podfile = '''load File.join(File.dirname(File.realpath(__FILE__)), \"Flutter\", \"podhelper.rb\")
          platform :ios, \"15.0\"
          target \"Runner\" do
            use_frameworks! :linkage => :static
            use_modular_headers!
            flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
          end
          post_install do |installer|
            installer.pods_project.targets.each do |target|
              flutter_additional_ios_build_settings(target)
              target.build_configurations.each do |config|
                config.build_settings[\"IPHONEOS_DEPLOYMENT_TARGET\"] = \"15.0\"
                config.build_settings[\"DEFINES_MODULE\"] = \"YES\"
                config.build_settings[\"SWIFT_VERSION\"] = \"5.0\"
              end
            end
          end
          '''
                    open('ios/Podfile', 'w').write(podfile)
                    print('Podfile nuevo:')
                    print(open('ios/Podfile').read())
                    "

      - name: Pod install
        run: cd ios && pod install --repo-update

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            archive 2>&1 | tail -150

      - name: Create IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r build/Runner.xcarchive/Products/Applications/Runner.app build/ipa/Payload/
          cd build/ipa && zip -r ../../risk_runner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_ipa
          path: risk_runner.ipa

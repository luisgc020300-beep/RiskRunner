name: Build iOS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Ruby + CocoaPods ────────────────────────────────────────────────
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      # ── 3. Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 4. Flutter pub get ─────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 5. Generar config iOS (Podfile + GeneratedPluginRegistrant) ────────
      - name: Generate iOS native config
        run: flutter build ios --config-only --release --no-codesign

      # ── 6. Reemplazar Podfile con versión corregida ────────────────────────
      #   El Podfile del repo tiene los fixes para cloud_firestore
      #   con static linkage. flutter --config-only puede sobreescribirlo,
      #   así que lo restauramos desde git después de config-only.
      - name: Restore fixed Podfile
        run: git checkout ios/Podfile

      # ── 7. Pod install limpio ──────────────────────────────────────────────
      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      # ── 8. Build con xcodebuild ────────────────────────────────────────────
      - name: Build iOS with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      # ── 9. Subir artefacto ─────────────────────────────────────────────────
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
          if-no-files-found: warn

name: Build iOS
on: [push]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      
      - name: Install Dependencies
        run: flutter pub get

      - name: Clean Xcode Cache
        run: |
          cd ios
          # Borramos carpetas de compilación y dependencias previas
          rm -rf build
          rm -rf Pods
          rm -rf Podfile.lock
          # Desvinculamos CocoaPods completamente para forzar una instalación limpia
          pod deintegrate
          # Instalamos los Pods desde cero actualizando repositorios
          pod install --repo-update

      - name: Setup Flutter Config
        run: |
          # Generamos los archivos .xcconfig necesarios para el Podfile
          flutter build ios --config-only --no-codesign

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiApp-iOS
          path: build/ios/iphoneos/Runner.app
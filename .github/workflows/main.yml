name: Build iOS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Flutter ─────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # ── 3. Flutter dependencies ────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── 4. Generar archivos iOS nativos SIN compilar ───────────────────────
      #   flutter build ios regenera Podfile y GeneratedPluginRegistrant.
      #   Con --config-only solo genera los archivos de config, no compila
      #   ni ejecuta pod install.
      - name: Generate iOS config files (no build, no pod install)
        run: flutter build ios --config-only --release --no-codesign

      # ── 5. Instalar CocoaPods desde cero ───────────────────────────────────
      #   Ahora que Podfile está generado correctamente, instalamos los pods.
      #   --repo-update asegura que descarga cloud_firestore y Firebase frescos.
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      # ── 6. Compilar con xcodebuild directamente ────────────────────────────
      #   Usamos xcodebuild en lugar de flutter build ios para evitar que
      #   Flutter vuelva a ejecutar pod install y rompa la instalación.
      - name: Build iOS with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            FLUTTER_BUILD_MODE=release \
            build

      # ── 7. Subir artefacto ─────────────────────────────────────────────────
      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7

name: Build iOS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate iOS native config
        run: flutter build ios --config-only --release --no-codesign

      # DIAGNÓSTICO: ver qué hay en .flutter-plugins-dependencies
      - name: Show flutter plugins dependencies
        run: |
          echo "=== .flutter-plugins-dependencies ==="
          cat .flutter-plugins-dependencies || echo "ARCHIVO NO EXISTE"
          echo "=== .flutter-plugins ==="
          cat .flutter-plugins || echo "ARCHIVO NO EXISTE"

      - name: Restore Podfile from repo
        run: git checkout ios/Podfile

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: "true"

      - name: Verify Pods
        run: |
          echo "=== Pods instalados ==="
          ls ios/Pods/
          ls ios/Pods/ | grep -i -E "firebase|firestore|grpc|boring|abseil|cloud" || echo "WARN: no encontrados"

      - name: Build iOS with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE=""

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-release-app
          path: build/ios/iphoneos/Runner.app
          retention-days: 7
          if-no-files-found: warn

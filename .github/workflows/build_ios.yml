name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Patch Podfile with use_frameworks!
        run: |
          cd ios
          # Flutter regenera el Podfile, así que lo parcheamos después
          head -5 Podfile
          sed -i '' "s/target 'Runner' do/target 'Runner' do\n  use_frameworks!\n  use_modular_headers!/" Podfile
          cat Podfile

      - name: Install CocoaPods dependencies
        run: |
          cd ios
          pod install --repo-update

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign --no-pub

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r risk_runner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner-ipa
          path: risk_runner.ipa

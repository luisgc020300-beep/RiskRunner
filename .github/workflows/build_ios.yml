name: Build iOS IPA
on:
  workflow_dispatch:
jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate Flutter files
        run: flutter build ios --release --no-codesign 2>&1 || true

      - name: Pod install with correct config
        run: |
          cd ios
          pod deintegrate || true
          pod install --repo-update

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            archive 2>&1 | grep -E "(error:|warning:|BUILD|FAILED|SUCCEEDED|cloud_firestore)" | tail -50

      - name: Find and package app
        run: |
          echo "=== Buscando .app en xcarchive ==="
          find $GITHUB_WORKSPACE/build/Runner.xcarchive -name "*.app" -type d
          APP_PATH=$(find $GITHUB_WORKSPACE/build/Runner.xcarchive -name "*.app" -type d | head -1)
          echo "APP: $APP_PATH"
          ls -la "$APP_PATH"
          mkdir -p $GITHUB_WORKSPACE/build/ipa/Payload
          cp -r "$APP_PATH" $GITHUB_WORKSPACE/build/ipa/Payload/
          cd $GITHUB_WORKSPACE/build/ipa
          zip -r $GITHUB_WORKSPACE/risk_runner.ipa Payload/
          ls -lh $GITHUB_WORKSPACE/risk_runner.ipa

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_ipa
          path: ${{ github.workspace }}/risk_runner.ipa

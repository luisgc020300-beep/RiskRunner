name: Build iOS IPA

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate Flutter iOS config
        run: flutter build ios --config-only --release --no-codesign

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install CocoaPods
        run: gem install cocoapods --no-document

      - name: Pod install
        run: |
          cd ios
          rm -rf Pods Podfile.lock
          pod install --repo-update
        env:
          COCOAPODS_DISABLE_STATS: true

      - name: Flutter build iOS
        run: flutter build ios --release --no-codesign

      - name: Build with xcodebuild
        run: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath $GITHUB_WORKSPACE/build/Runner.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            COMPILER_INDEX_STORE_ENABLE=NO \
            IPHONEOS_DEPLOYMENT_TARGET=15.0 \
            archive

      - name: Package IPA
        run: |
          APP_PATH=$(find $GITHUB_WORKSPACE/build/Runner.xcarchive/Products/Applications -name "*.app" -type d | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find $GITHUB_WORKSPACE/build/Runner.xcarchive -name "*.app" -type d | head -1)
          fi
          echo "Using app at: $APP_PATH"
          mkdir -p $GITHUB_WORKSPACE/build/ipa/Payload
          cp -r "$APP_PATH" $GITHUB_WORKSPACE/build/ipa/Payload/
          cd $GITHUB_WORKSPACE/build/ipa
          zip -r $GITHUB_WORKSPACE/risk_runner.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_ipa
          path: ${{ github.workspace }}/risk_runner.ipa
          retention-days: 7

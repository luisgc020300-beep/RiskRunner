name: Build Android APK
on:
  workflow_dispatch:
jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
      - name: Create env.dart
        run: |
          python3 -c "
          content = '''class Env {
            Env._();
            static const bool isDebug = true;
            static const String revenueCatAndroid = '';
            static const String revenueCatIOS     = '';
            static const String mapboxPublicToken  = 'pk.eyJ1IjoibHVpaXNnb29tZXp6MSIsImEiOiJjbW1mNDVoajkwNGNyMnBzNTBiaXNrMm5pIn0.gzN772_GMDx55owCXwsozA';
            static const String mapboxStyleId      = 'luiisgoomezz1/cmmdzh1aj00f501r68crag5gv';
            static const String entitlementPremium = 'premium';
            static const String productMonthly     = 'riskrunner_premium_monthly';
            static const String productAnnual      = 'riskrunner_premium_annual';
            static const String anthropicApiKey    = '';
          }'''
          with open('lib/config/env.dart', 'w') as f:
              f.write(content)
          "
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: flutter build apk --debug --dart-define=MAPBOX_TOKEN=${{ secrets.MAPBOX_TOKEN }} 2>&1 | tee build_output.txt; exit ${PIPESTATUS[0]}

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build_log
          path: build_output.txt
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk_runner_apk
          path: build/app/outputs/flutter-apk/app-debug.apk
